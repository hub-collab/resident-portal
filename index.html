<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resident Portal</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
    p { color: #555; margin-bottom: 24px; }
    #status {
      margin-top: 16px;
      font-size: 16px;
      font-weight: bold;
      padding: 12px;
      border-radius: 8px;
    }
    .approved { background: #e6f4ea; color: #137333; }
    .denied { background: #fce8e6; color: #c5221f; }
    .checking { background: #e8f0fe; color: #1a73e8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Resident Portal</h1>
    <p>Sign in with your Google account to continue.</p>

    <div id="signInSection">
      <div id="g_id_onload"
           data-client_id="770250489292-h2qaulrv1df968m88m0l9t5eg72jkt6e.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>

    <div id="userInfo" style="display:none">
      <p id="welcomeMsg"></p>
      <div id="status" class="checking">Checking membership...</div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw8YwCeoyXX8PekhjNfSVXKdBvYHINzMZJ60VZN7y3ethCPbwIJuBv4Pjle1FIUoyMO-w/exec';

    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      const email = payload.email;
      const name = payload.name;

      document.getElementById('signInSection').style.display = 'none';
      document.getElementById('userInfo').style.display = 'block';
      document.getElementById('welcomeMsg').textContent = 'Welcome, ' + name + ' (' + email + ')';

      // Call GAS to check membership
      fetch(GAS_URL + '?email=' + encodeURIComponent(email))
        .then(response => response.json())
        .then(data => {
          const statusEl = document.getElementById('status');
          if (data.status === 'approved') {
            statusEl.textContent = '✅ Access granted — you are a verified resident!';
            statusEl.className = 'approved';
          } else {
            statusEl.textContent = '❌ Access denied — your email is not in our system.';
            statusEl.className = 'denied';
          }
        })
        .catch(err => {
          document.getElementById('status').textContent = '⚠️ Error checking membership. Please try again.';
        });
    }
  </script>
</body>
</html>
