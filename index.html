<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resident Portal</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
    p { color: #555; margin-bottom: 24px; }
    #signInBtn {
      background: #4285F4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    #userInfo { display: none; }
    #status { margin-top: 16px; color: #555; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Resident Portal</h1>
    <p>Sign in with your Google account to continue.</p>

    <div id="signInSection">
      <div id="g_id_onload"
           data-client_id="770250489292-h2qaulrv1df968m88m0l9t5eg72jkt6e.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>

    <div id="userInfo">
      <p id="welcomeMsg"></p>
      <p id="status"></p>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      const email = payload.email;
      const name = payload.name;

      document.getElementById('signInSection').style.display = 'none';
      document.getElementById('userInfo').style.display = 'block';
      document.getElementById('welcomeMsg').textContent = 'Welcome, ' + name + ' (' + email + ')';
      document.getElementById('status').textContent = 'Checking membership...';

      // Next step: we will call GAS here to verify membership
    }
  </script>
</body>
</html>
