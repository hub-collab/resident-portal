<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resident Portal</title>
  <!--
    7500 York Cooperative — Resident Portal Auth Gateway
    Version 1.3 — May 14, 2026
    Changes from v1.2:
      - Added return URL support: after access granted, redirects resident
        back to the page they came from (or portal home if none specified)
      - Removed visible "Access granted" screen — redirect is seamless
      - Added "checking" spinner message during redirect
      - DOMContentLoaded now also respects return URL for session restores
      - Access denied message updated to match architecture documentation
  -->
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f2f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #1a1a2e; margin-bottom: 0.5rem; }
    p  { color: #555; }
    .approved { color: #2e7d32; font-weight: bold; margin-top: 1rem; }
    .denied   { color: #c62828; font-weight: bold; margin-top: 1rem; }
    .checking { color: #555; margin-top: 1rem; }
    #signOutBtn {
      margin-top: 1.5rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      color: #555;
      cursor: pointer;
      font-size: 0.9rem;
    }
    #signOutBtn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Resident Portal</h1>
    <p>Sign in with your Google account to continue.</p>

    <div id="signInSection">
      <div id="g_id_onload"
           data-client_id="770250489292-h2qaulrv1df968m88m0l9t5eg72jkt6e.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="userInfo" style="display:none">
      <p id="welcomeMsg"></p>
      <div id="status" class="checking">Checking membership...</div>
      <button id="signOutBtn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // ── CONFIG — all tunable parameters live here ─────────────────────────────
    const CONFIG = {
      oauthClientId:    "770250489292-h2qaulrv1df968m88m0l9t5eg72jkt6e.apps.googleusercontent.com",
      sheetId:          "1PBSKpCwLmvtS6He0cgpR9cqCHzSqnpjlsjd4ROv-xA0",
      apiKey:           "AIzaSyCTSyqjBaZKu62m6KD8PW6xIklFU68COAE",
      authTab:          "Auth",
      emailColHeader:   "Email",
      resetColHeader:   "SessionResetAfter",
      sessionKey:       "residentPortalSession",
      expiryTimezone:   "America/Chicago",
      expiryHour:       0,       // midnight — set to 720 hours (30 days) for production
      expiryMinute:     0,
      defaultReturnUrl: "https://sites.google.com/7500york.org/7500yorkresidentportal",
    };
    // ─────────────────────────────────────────────────────────────────────────

    // ── Get return URL from query parameter ───────────────────────────────────
    // Reads ?return=URL from the query string.
    // If no return parameter is present, defaults to the portal home page.
    // The Google Site Sign In button passes ?return=<current page URL>
    // so the resident is sent back to exactly where they started.
    function getReturnUrl() {
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get("return");
      // Basic safety check — only allow same-domain or known Google Sites URLs
      if (returnUrl && returnUrl.startsWith("https://sites.google.com/7500york.org/")) {
        return returnUrl;
      }
      return CONFIG.defaultReturnUrl;
    }

    // ── Compute next expiry: next occurrence of expiryHour:expiryMinute CDT ──
    function computeExpiry() {
      const now = new Date();

      const todayStr = now.toLocaleDateString("en-CA", {
        timeZone: CONFIG.expiryTimezone
      });

      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: CONFIG.expiryTimezone,
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
      });

      function tzToUtcMs(dateStr, hour, minute) {
        const probe = new Date(`${dateStr}T12:00:00Z`);
        const parts = formatter.formatToParts(probe);
        const p = {};
        parts.forEach(({type, value}) => p[type] = value);
        const localNoon = new Date(
          `${p.year}-${p.month}-${p.day}T${String(hour).padStart(2,"0")}:` +
          `${String(minute).padStart(2,"0")}:00Z`
        );
        const utcNoon = new Date(`${dateStr}T12:00:00Z`);
        const localNoonFormatted = new Date(utcNoon.toLocaleString("en-US", {
          timeZone: CONFIG.expiryTimezone
        }));
        const offsetMs = utcNoon - localNoonFormatted;
        return localNoon.getTime() + offsetMs;
      }

      let expiryMs = tzToUtcMs(todayStr, CONFIG.expiryHour, CONFIG.expiryMinute);

      if (expiryMs <= now.getTime()) {
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const tomorrowStr = tomorrow.toLocaleDateString("en-CA", {
          timeZone: CONFIG.expiryTimezone
        });
        expiryMs = tzToUtcMs(tomorrowStr, CONFIG.expiryHour, CONFIG.expiryMinute);
      }

      return expiryMs;
    }

    // ── Session helpers ───────────────────────────────────────────────────────
    function saveSession(name, email) {
      const expires = computeExpiry();
      const savedAt = Date.now();
      localStorage.setItem(CONFIG.sessionKey,
        JSON.stringify({ name, email, expires, savedAt }));
    }

    function getSession() {
      try {
        const raw = localStorage.getItem(CONFIG.sessionKey);
        if (!raw) return null;
        const session = JSON.parse(raw);
        if (Date.now() > session.expires) {
          localStorage.removeItem(CONFIG.sessionKey);
          return null;
        }
        return session;
      } catch { return null; }
    }

    function clearSession() {
      localStorage.removeItem(CONFIG.sessionKey);
    }

    function signOut() {
      clearSession();
      document.getElementById("userInfo").style.display      = "none";
      document.getElementById("signInSection").style.display = "block";
      document.getElementById("status").textContent          = "Checking membership...";
      document.getElementById("status").className            = "checking";
    }

    // ── UI helper ─────────────────────────────────────────────────────────────
    function showUserInfo(name, email) {
      document.getElementById("signInSection").style.display = "none";
      document.getElementById("userInfo").style.display      = "block";
      document.getElementById("welcomeMsg").textContent =
        "Welcome, " + name + " (" + email + ")";
    }

    // ── Google Sign-In callback ───────────────────────────────────────────────
    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split(".")[1]));
      saveSession(payload.name, payload.email);
      showUserInfo(payload.name, payload.email);
      checkMembership(payload.name, payload.email);
    }

    // ── Membership + session-reset check ─────────────────────────────────────
    // Fetches header row + all data rows from the Auth tab in one call.
    // Finds Email and SessionResetAfter columns by header name (not letter).
    function checkMembership(name, email) {
      const tab = encodeURIComponent(CONFIG.authTab);
      const url = `https://sheets.googleapis.com/v4/spreadsheets/` +
                  `${CONFIG.sheetId}/values/${tab}?key=${CONFIG.apiKey}`;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const rows = data.values || [];
          if (rows.length < 2) return membershipResult(false, null, email);

          const headers  = rows[0].map(h => h.trim());
          const emailCol = headers.indexOf(CONFIG.emailColHeader);
          const resetCol = headers.indexOf(CONFIG.resetColHeader);

          if (emailCol === -1) {
            console.warn(`Column "${CONFIG.emailColHeader}" not found in headers:`, headers);
            return membershipResult(false, null, email);
          }

          const match = rows.slice(1).find(row =>
            (row[emailCol] || "").toLowerCase() === email.toLowerCase()
          );

          if (!match) return membershipResult(false, null, email);

          const resetVal = (resetCol !== -1 && match[resetCol])
            ? match[resetCol].trim() : null;

          membershipResult(true, resetVal, email, name);
        })
        .catch(() => {
          document.getElementById("status").textContent =
            "⚠️ Error checking membership. Please try again.";
        });
    }

    function membershipResult(found, resetVal, email, name) {
      const el = document.getElementById("status");

      if (!found) {
        // Access denied — show message, do not redirect
        el.textContent = "Your email is not registered for portal access. Please contact administration.";
        el.className   = "denied";
        return;
      }

      // Check session reset: if resetVal is a parseable date and
      // the session was saved before it, force sign-out
      if (resetVal) {
        const resetMs  = Date.parse(resetVal);
        const session  = getSession();
        const savedAt  = session ? session.savedAt : 0;
        if (!isNaN(resetMs) && savedAt < resetMs) {
          clearSession();
          el.textContent = "🔒 Your session has been reset. Please sign in again.";
          el.className   = "denied";
          setTimeout(() => {
            document.getElementById("userInfo").style.display      = "none";
            document.getElementById("signInSection").style.display = "block";
            el.textContent = "Checking membership...";
            el.className   = "checking";
          }, 3000);
          return;
        }
      }

      // Access granted — redirect to return URL seamlessly
      // Resident sees a brief "redirecting" message then is sent to their destination
      el.textContent = "✅ Verified — redirecting to portal...";
      el.className   = "approved";
      setTimeout(() => {
        window.location.href = getReturnUrl();
      }, 1000);
    }

    // ── On page load ──────────────────────────────────────────────────────────
    // If a valid session exists, verify membership and redirect immediately.
    // This handles the case where a resident with a valid session is sent
    // to this page (e.g. from a Sign In button on a sub-page).
    window.addEventListener("DOMContentLoaded", () => {
      const saved = getSession();
      if (saved) {
        showUserInfo(saved.name, saved.email);
        checkMembership(saved.name, saved.email);
        // membershipResult will handle the redirect if access is granted
      }
    });
  </script>
</body>
</html>
